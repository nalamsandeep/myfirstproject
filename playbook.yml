---
# Simple Ansible Playbook for Learning
# This playbook installs and configures Nginx on web servers

- name: Setup Web Servers
  hosts: webservers                    # Target group of servers
  become: yes                          # Run tasks with sudo
  vars:                                # Define variables
    nginx_port: 80
    nginx_user: nginx
    server_name: "mywebserver.com"

  tasks:
    # Task 1: Install Nginx
    - name: Install Nginx
      yum:
        name: nginx
        state: present
      when: ansible_os_family == "RedHat"  # Only run on RedHat/CentOS/RHEL

    # Task 2: Create a simple HTML file
    - name: Create index.html
      copy:
        content: |
          <h1>Welcome to {{ server_name }}</h1>
          <p>This server is managed by Ansible</p>
        dest: /usr/share/nginx/html/index.html
        owner: root
        group: root
        mode: '0644'
      notify: restart nginx              # Trigger handler when changed

    # Task 3: Configure Nginx
    - name: Configure Nginx
      template:
        src: nginx.conf.j2              # Template file (we'll create this)
        dest: /etc/nginx/nginx.conf
        backup: yes                     # Backup original file
      notify: restart nginx

    # Task 4: Start and enable Nginx service
    - name: Start Nginx service
      service:
        name: nginx
        state: started
        enabled: yes                    # Auto-start on boot

    # Task 5: Check if Nginx is running
    - name: Verify Nginx is running
      uri:
        url: "http://localhost:{{ nginx_port }}"
        status_code: 200
      register: nginx_check             # Save result in variable
      retries: 3                        # Retry 3 times if fails
      delay: 2                          # Wait 2 seconds between retries

    # Task 6: Display result
    - name: Show Nginx status
      debug:
        msg: "Nginx is running! Status: {{ nginx_check.status }}"

  # Handlers: Only run if notified by a task
  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted
      listen: "restart nginx"           # Handler name for notify

  # Run tasks only on specific servers
  post_tasks:
    - name: Final message
      debug:
        msg: "Web server setup complete on {{ inventory_hostname }}"
